<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gefühlsrad - Online</title>
    <link rel="stylesheet" href="gefuehlsrad-style.css">
</head>
<body>

    <h1>Gefühlsrad</h1>
    <div id="info-box">Fahre mit der Maus über das Rad...</div>
    
    <div class="slider-container">
        <label for="rotation-slider">Rad drehen:</label>
        <input type="range" id="rotation-slider" min="0" max="360" value="0">
    </div>
    
    <svg id="wheel-container" width="900" height="900">
        <g id="wheel-group"></g>
    </svg>

    <script src="gefuehlsrad-script.js"></script>
</body>
</html>
