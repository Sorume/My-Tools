<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tool Dashboard</title>
    <style>
        :root {
            --bg: #161618;
            --card-bg: #1c1c1e;
            --accent: #9e60f2;
            --text-dim: #a1a1aa;
            --border: #2c2c2e;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: #ececec; 
            padding: 40px; 
            margin: 0;
        }

        h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }

        #tool-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .tool-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 24px; 
            transition: all 0.2s ease; 
            text-decoration: none; 
            color: white; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-card:hover { 
            border-color: var(--accent); 
            background: #252529;
            transform: translateY(-2px);
        }

        .emoji-display { 
            font-size: 42px; 
            margin-bottom: 12px; 
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
        }

        .emoji-display:hover { transform: scale(1.2); }

        .tool-name { 
            font-weight: 500; 
            font-size: 14px; 
            color: #efeff1;
            text-align: center;
        }

        .edit-hint {
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tool-card:hover .edit-hint { opacity: 1; }

        .loading { color: var(--text-dim); font-style: italic; grid-column: 1/-1; }
    </style>
</head>
<body>
    <h1>Kommandozentrale</h1>
    <p class="subtitle">Automatische Synchronisation mit GitHub Repository</p>
    
    <div id="tool-container">
        <div class="loading">Initialisiere Schnittstelle...</div>
    </div>

    <script>
        // Speicher für die Emojis im Browser
        const emojiStorageKey = "dashboard_tool_emojis";

        function getSavedEmoji(toolName) {
            const saved = JSON.parse(localStorage.getItem(emojiStorageKey) || "{}");
            return saved[toolName] || "🛠️"; // Standard-Emoji
        }

        function saveEmoji(toolName) {
            const newEmoji = prompt(`Wähle ein neues Emoji für "${toolName}":`);
            if (newEmoji && newEmoji.trim() !== "") {
                const saved = JSON.parse(localStorage.getItem(emojiStorageKey) || "{}");
                saved[toolName] = newEmoji.trim();
                localStorage.setItem(emojiStorageKey, JSON.stringify(saved));
                loadTools(); // Liste neu zeichnen
            }
        }

        async function loadTools() {
            const user = "sorume"; 
            const repo = "My-Tools";
            const container = document.getElementById('tool-container');

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
                const files = await response.json();

                container.innerHTML = "";

                files.forEach(file => {
                    if (file.name.endsWith('.html') && file.name !== 'index.html') {
                        const displayName = file.name.replace('.html', '');
                        const currentEmoji = getSavedEmoji(displayName);

                        const card = document.createElement('div');
                        card.className = 'tool-card';
                        
                        card.innerHTML = `
                            <span class="emoji-display" title="Emoji ändern">${currentEmoji}</span>
                            <a href="${file.name}" class="tool-name" style="text-decoration:none; color:inherit;">
                                ${displayName.replace(/_/g, ' ')}
                            </a>
                            <span class="edit-hint">Klick auf Emoji zum Ändern</span>
                        `;

                        // Klick auf Emoji ändert das Symbol
                        card.querySelector('.emoji-display').onclick = (e) => {
                            e.preventDefault();
                            saveEmoji(displayName);
                        };

                        // Klick auf die restliche Karte öffnet das Tool
                        card.onclick = (e) => {
                            if (!e.target.classList.contains('emoji-display')) {
                                window.location.href = file.name;
                            }
                        };

                        container.appendChild(card);
                    }
                });
            } catch (error) {
                container.innerHTML = "<p>Fehler beim Abrufen der Repository-Daten.</p>";
            }
        }

        loadTools();
    </script>
</body>
</html>
